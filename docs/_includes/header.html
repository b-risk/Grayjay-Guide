<header class="site-header">
  <a href="{{ '/' | relative_url }}" class="site-header__logo-link">
    <img src="{{ '/assets/images/grayjay-logo.svg' | relative_url }}" alt="Grayjay" class="site-header__logo">
    <span class="site-header__title">{{ site.title }}</span>
  </a>
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <span class="theme-toggle__icon">☀️</span>
  </button>
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span class="hamburger__line"></span>
    <span class="hamburger__line"></span>
    <span class="hamburger__line"></span>
  </button>
</header>
